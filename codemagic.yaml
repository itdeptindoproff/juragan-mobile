workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      java: 21
      node: 22
    scripts:
      - name: Cek versi Java
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project Android
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

  android-release:
    name: Android Release AAB
    max_build_duration: 30
    environment:
      java: 21
      node: 22
      android_signing:
        - juragan_keystore
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project Android
        script: npx cap sync android
      - name: Build release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab


  ios-testflight:
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: juragan_asc_key
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: id.biz.juragansejati.portal
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project iOS
        script: npx cap sync ios
      - name: Pasang CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Set nomor build
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-simulator:
    name: iOS Simulator (tanpa signing, untuk cek kompilasi)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project iOS
        script: npx cap sync ios
      - name: Pasang CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Build untuk simulator
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build/sim \
            CODE_SIGNING_ALLOWED=NO build
    artifacts:
      - build/sim/Build/Products/Debug-iphonesimulator/*.app