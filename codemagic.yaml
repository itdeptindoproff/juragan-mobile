workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      java: 17
      node: 22
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project Android
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk