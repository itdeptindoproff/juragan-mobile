workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 30
    environment:
      java: 21
      node: 22
    scripts:
      - name: Cek versi Java
        script: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project Android
        script: npx cap sync android
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

  android-release:
    name: Android Release AAB
    max_build_duration: 30
    environment:
      java: 21
      node: 22
      android_signing:
        - juragan_keystore
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project Android
        script: npx cap sync android
      - name: Build release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab


  ios-testflight:
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: juragan_asc_key
    environment:
      node: 22
      xcode: latest
      ios_signing:
        provisioning_profiles:
          - profile: juragan_appstore
        certificates:
          - certificate: juragan_distribution
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project iOS
        script: npx cap sync ios
      - name: Set nomor build
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Terapkan provisioning profile ke Xcode project
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_*.log
    publishing:
      app_store_connect:
        auth: integration
        # Hanya upload untuk INTERNAL testing — tidak submit ke external beta review
        # (external butuh App Review + Test Information). Internal tester langsung bisa.
        submit_to_testflight: false

  ios-simulator:
    name: iOS Simulator (tanpa signing, untuk cek kompilasi)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: Pasang dependensi
        script: npm ci
      - name: Sinkronkan Capacitor ke project iOS
        script: npx cap sync ios
      - name: Build untuk simulator
        script: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build/sim \
            CODE_SIGNING_ALLOWED=NO build
    artifacts:
      - build/sim/Build/Products/Debug-iphonesimulator/*.app